# Nginx sample config (reverse proxy)
# Replace: your-domain.com  and  Node port if you change API_PORT.

server {
  listen 80;
  server_name luaniikvi.site;

  # If you enable HTTPS (recommended), you'll typically have a second server block for 443.

  # WebSocket endpoint
  location /ws {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }

  # Everything else (frontend + /api)
  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
